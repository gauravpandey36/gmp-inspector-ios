workflows:
  default-workflow:
    name: Default Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - code-signing
      vars:
        BUNDLE_ID: "com.gmpinspector.app"
      flutter: stable
      xcode: latest
    scripts:
      - name: Generate Flutter project scaffold
        script: |
          cd /tmp
          flutter create scaffold --org com.gmpinspector --platforms ios,android --project-name gmp_inspector
          cp -r /tmp/scaffold/ios/ $CM_BUILD_DIR/ios/
          cp -r /tmp/scaffold/android/ $CM_BUILD_DIR/android/
      - name: Install dependencies
        script: |
          cd $CM_BUILD_DIR
          flutter pub get
      - name: Fix bundle ID and add permissions
        script: |
          cd $CM_BUILD_DIR
          sed -i '' 's/com.gmpinspector.gmpInspector/com.gmpinspector.app/g' ios/Runner.xcodeproj/project.pbxproj
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Camera for GMP inspection'" ios/Runner/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Microphone for video'" ios/Runner/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Photo library access'" ios/Runner/Info.plist 2>/dev/null || true
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files $BUNDLE_ID --type IOS_APP_STORE --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing on Xcode project
        script: xcode-project use-profiles
      - name: Build Flutter
        script: |
          cd $CM_BUILD_DIR
          flutter build ios --release --no-codesign
      - name: Build signed IPA
        script: |
          cd $CM_BUILD_DIR
          xcode-project build-ipa --workspace ios/Runner.xcworkspace --scheme Runner
    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
