workflows:
  default-workflow:
    name: Default Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: GMP Inspector
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Generate Flutter project scaffold
        script: |
          cd /tmp
          flutter create scaffold --org com.gmpinspector --platforms ios,android --project-name gmp_inspector
          cp -r /tmp/scaffold/ios/ $CM_BUILD_DIR/ios/
          cp -r /tmp/scaffold/android/ $CM_BUILD_DIR/android/
      - name: Install dependencies
        script: |
          cd $CM_BUILD_DIR
          flutter pub get
      - name: Fix bundle ID and signing
        script: |
          cd $CM_BUILD_DIR
          # Fix bundle ID
          sed -i '' 's/com.gmpinspector.gmpInspector/com.gmpinspector.app/g' ios/Runner.xcodeproj/project.pbxproj
          # Switch to manual signing
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' ios/Runner.xcodeproj/project.pbxproj
          # Add permissions
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Camera for GMP inspection'" ios/Runner/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Microphone for video'" ios/Runner/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Photo library access'" ios/Runner/Info.plist 2>/dev/null || true
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.gmpinspector.app" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build Flutter
        script: |
          cd $CM_BUILD_DIR
          flutter build ios --release --no-codesign
      - name: Package IPA
        script: |
          cd $CM_BUILD_DIR
          xcode-project build-ipa --workspace ios/Runner.xcworkspace --scheme Runner
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
