workflows:
  default-workflow:
    name: Default Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: GMP Inspector
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Generate Flutter project scaffold
        script: |
          cd /tmp
          flutter create scaffold --org com.gmpinspector --platforms ios,android --project-name gmp_inspector
          cp -r /tmp/scaffold/ios/ $CM_BUILD_DIR/ios/
          cp -r /tmp/scaffold/android/ $CM_BUILD_DIR/android/
      - name: Install dependencies
        script: |
          cd $CM_BUILD_DIR
          flutter pub get
      - name: Fix bundle ID and add permissions
        script: |
          cd $CM_BUILD_DIR
          sed -i '' 's/com.gmpinspector.gmpInspector/com.gmpinspector.app/g' ios/Runner.xcodeproj/project.pbxproj
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Camera for GMP inspection'" ios/Runner/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Microphone for video'" ios/Runner/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Photo library access'" ios/Runner/Info.plist 2>/dev/null || true
      - name: Fetch signing files
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.gmpinspector.app" --type IOS_APP_STORE --create
          keychain add-certificates
      - name: Debug and configure signing
        script: |
          echo "=== Installed provisioning profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles dir"
          echo ""
          echo "=== Profile details ==="
          for f in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
            echo "--- $f ---"
            security cms -D -i "$f" 2>/dev/null | grep -A1 "Name\|UUID\|TeamIdentifier\|application-identifier" | head -20
            echo ""
          done
          echo ""
          echo "=== Keychain certificates ==="
          security find-identity -v -p codesigning
      - name: Apply signing to Xcode project
        script: |
          cd $CM_BUILD_DIR
          # Get the provisioning profile UUID
          PROFILE_UUID=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1 | xargs basename | sed 's/.mobileprovision//')
          echo "Using profile UUID: $PROFILE_UUID"
          
          # Get the signing identity
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning | grep "Apple Distribution" | head -1 | awk -F'"' '{print $2}')
          echo "Using identity: $SIGNING_IDENTITY"
          
          # Update pbxproj manually
          cd ios
          # Set Manual signing
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' Runner.xcodeproj/project.pbxproj
          # Set team
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = L5RDZ7965F;/g' Runner.xcodeproj/project.pbxproj
          # Set provisioning profile
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"\";/PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_UUID\";/g" Runner.xcodeproj/project.pbxproj
          # Add provisioning profile where missing
          sed -i '' "/CODE_SIGN_IDENTITY/a\\
\\				PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_UUID\";" Runner.xcodeproj/project.pbxproj 2>/dev/null || true
          
          echo "Signing configured manually"
      - name: Build Flutter without signing
        script: |
          cd $CM_BUILD_DIR
          flutter build ios --release --no-codesign
      - name: Create signed IPA
        script: |
          cd $CM_BUILD_DIR
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner
    artifacts:
      - build/ios/ipa/*.ipa
      - "**/*.ipa"
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
